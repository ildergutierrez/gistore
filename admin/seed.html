    const pass   = prompt("Contraseña:");
    await signInWithEmailAndPassword(auth, correo, pass);
    log("✓ Autenticado correctamente");

    // 1 — Vendedor
    log("── Creando vendedor principal...", "inf");
    const vendedorRef = doc(collection(db, "vendedores"));
    await setDoc(vendedorRef, VENDEDOR);
    const vendedor_id = vendedorRef.id;
    log("✓ Vendedor creado · ID: " + vendedor_id);

    // 2 — Membresía
    log("── Creando membresía...", "inf");
    const membresiaRef = doc(collection(db, "membresias"));
    await setDoc(membresiaRef, { ...MEMBRESIA, vendedor_id });
    log("✓ Membresía creada · ID: " + membresiaRef.id);

    // 3 — Categorías
    log("── Creando categorías...", "inf");
    const catMap = {};
    for (const cat of CATEGORIAS) {
      const ref = await addDoc(collection(db, "categorias"), cat);
      catMap[cat.nombre] = ref.id;
      log("✓ Categoría: " + cat.nombre + " · ID: " + ref.id);
    }

    // 4 — Productos
    log("── Creando 43 productos...", "inf");
    let count = 0;
    for (const p of PRODUCTOS) {
      await addDoc(collection(db, "productos"), {
        nombre: p.nombre, valor: p.valor,
        descripcion: p.descripcion, recomendacion: p.recomendacion,
        beneficios: p.beneficios, imagen: p.imagen,
        categoria_id: catMap[p.categoria] || "",
        vendedor_id: vendedor_id,
        activo: true, creado_en: new Date().toISOString(),
      });
      count++;
      log("✓ [" + count + "/43] " + p.nombre);
    }

    log("──────────────────────────────────────────", "inf");
    log("🎉 ¡Listo! Firestore poblado correctamente.", "fin");
    log("Vendedor ID: " + vendedor_id, "fin");
    btn.textContent = "✓ Completado";

  } catch (err) {
    log("❌ Error: " + err.message, "err");
    console.error(err);
    btn.disabled = false;
    btn.textContent = "▶ Reintentar";
  }
});
</script>
</body>
</html>
