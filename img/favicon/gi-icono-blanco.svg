<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f5ee;stop-opacity:1" />
    </linearGradient>
    <filter id="sh2" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Hexágono blanco -->
  <polygon
    points="50,4 92,27 92,73 50,96 8,73 8,27"
    fill="url(#wg)"
    filter="url(#sh2)"
  />
  <polygon
    points="50,10 86,31 86,69 50,90 14,69 14,31"
    fill="none"
    stroke="rgba(45,148,88,0.25)"
    stroke-width="1.5"
  />

  <!-- G en verde -->
  <text
    x="14" y="68"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48"
    font-weight="700"
    fill="#1a6b3c"
    letter-spacing="-3"
  >G</text>

  <!-- I en verde claro -->
  <text
    x="57" y="68"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48"
    font-weight="700"
    fill="#2d9458"
  >I</text>
</svg>
