<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Exportar Catálogo — GI Store</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="icon" href="../../img/favicon/gi-icono-blanco.svg" type="image/svg+xml"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<button class="btn-hamburguesa" id="btnHamburguesa" aria-label="Menú">
  <span></span><span></span><span></span>
</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar">
    <a href="#" class="sidebar-logo" title="Ir al inicio 🏠" style="text-decoration:none;display:flex;align-items:center;gap:.75rem;padding:1.25rem 1.25rem 1rem;border-bottom:1px solid rgba(255,255,255,.12)">
    <div class="sidebar-logo-icono"><img src="../../img/favicon/gi-icono-blanco.svg" alt="GI Store" style="width:22px;height:22px;object-fit:contain"/></div>
    <div class="sidebar-logo-txt">
      <strong>GI Store</strong>
      <span>Portal Vendedor</span>
    </div>
  </a>
  <nav class="nav">
    <div class="nav-titulo">Mi cuenta</div>
    <a href="dashboard.html"><span class="icono"><span class="material-symbols-outlined">
bento
</span></span> Dashboard</a>
    <a href="productos.html"><span class="icono"><span class="material-symbols-outlined">
package_2
</span></span> Mis productos</a>
    <a href="#" class="activo"><span class="icono"><span class="material-symbols-outlined">
photo_library
</span></span> Exportar catálogo</a>
    <div class="nav-titulo">Sitio</div>
    <a href="perfil.html"><span class="icono"><span class="material-symbols-outlined">
assignment_ind
</span></span> Mi perfil</a>
    <div class="nav-titulo">Sitio</div>
    <a href="../../index.html" target="_blank"><span class="icono"><span class="material-symbols-outlined">
article_person
</span></span> Ver catálogo</a>
  </nav>
  <div class="sidebar-pie">
    <button class="btn-salir" id="btnSalir"><span class="material-symbols-outlined">
logout
</span> Cerrar sesión</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="topbar-izq">
      <h1>Exportar Catálogo</h1>
      <p class="fecha" id="fechaHoy"></p>
    </div>
    <div class="topbar-der">
      <button class="btn btn-primary" id="btnExportar">
        <span class="btn-texto">📄 Exportar PDF</span>
        <div class="spinner"></div>
      </button>
    </div>
  </div>

  <div class="panel" style="margin-bottom:1.5rem">
    <div class="panel-header"><h2>⚙ Opciones de exportación</h2></div>
    <div style="padding:1.25rem 1.5rem;display:flex;gap:1.5rem;flex-wrap:wrap;align-items:flex-end">
      <div class="campo" style="margin:0;flex:1;min-width:180px">
        <label>Incluir</label>
        <select id="filtroEstado">
          <option value="todos">Todos los productos</option>
          <option value="activos">Solo activos</option>
          <option value="inactivos">Solo inactivos</option>
        </select>
      </div>
      <div class="campo" style="margin:0;flex:1;min-width:180px">
        <label>Ordenar por</label>
        <select id="ordenPDF">
          <option value="nombre">Nombre (A-Z)</option>
          <option value="valor">Precio (menor a mayor)</option>
          <option value="categoria">Categoría</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Vista previa del PDF -->
  <div class="panel">
    <div class="panel-header">
      <h2>👁 Vista previa</h2>
      <span id="totalPrevia" style="font-size:.8rem;color:var(--texto-suave)"></span>
    </div>
    <div id="previaCatalogo" style="padding:1.5rem">
      <p class="cargando-txt">Cargando...</p>
    </div>
  </div>
</main>

<!-- Contenido del PDF (oculto) -->
<div id="contenidoPDF" style="display:none"></div>

<script type="module" src="../js/catalogo.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var btnH = document.getElementById('btnHamburguesa');
    var sidebar = document.querySelector('.sidebar');
    var overlay = document.getElementById('sidebarOverlay');
    if (!btnH || !sidebar || !overlay) return;
    function abrir() { sidebar.classList.add('abierto'); overlay.classList.add('visible'); btnH.classList.add('abierto'); }
    function cerrar() { sidebar.classList.remove('abierto'); overlay.classList.remove('visible'); btnH.classList.remove('abierto'); }
    btnH.addEventListener('click', function() { sidebar.classList.contains('abierto') ? cerrar() : abrir(); });
    overlay.addEventListener('click', cerrar);
    document.querySelectorAll('.nav a').forEach(function(a) { a.addEventListener('click', function() { if (window.innerWidth <= 700) cerrar(); }); });
  });
</script>
</body>
</html>
