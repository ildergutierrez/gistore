<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="verdGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#e8f5ee;stop-opacity:0.95" />
    </linearGradient>
    <filter id="sombra2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Hexágono blanco -->
  <polygon
    points="50,6 86,26 86,74 50,94 14,74 14,26"
    fill="url(#verdGrad2)"
    filter="url(#sombra2)"
  />
  <polygon
    points="50,11 81,29 81,71 50,89 19,71 19,29"
    fill="none"
    stroke="rgba(45,148,88,0.35)"
    stroke-width="1.5"
  />

  <!-- G I en verde sobre blanco -->
  <text x="32" y="63" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" fill="#1a6b3c" letter-spacing="-2">G</text>
  <text x="56" y="63" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" fill="#2d9458">I</text>

  <!-- Texto blanco -->
  <text x="106" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" fill="#ffffff" letter-spacing="1">GI</text>
  <text x="145" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" fill="rgba(255,255,255,0.85)" letter-spacing="2"> STORE</text>
  <line x1="106" y1="60" x2="310" y2="60" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <text x="106" y="76" font-family="'Arial', sans-serif" font-size="10" font-weight="400" fill="rgba(255,255,255,0.65)" letter-spacing="3.5">CALIDAD · ESTILO · CONFIANZA</text>
</svg>
